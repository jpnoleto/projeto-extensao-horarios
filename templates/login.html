<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sistema de Horários</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.2rem;
            box-sizing: border-box;
            background: #0a1628; /* fallback antes do campo estelar carregar */
        }
        .login-wrap { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div id="fundo-estrelas" aria-hidden="true"></div>

    <div class="login-wrap">
        {% with mensagens = get_flashed_messages(with_categories=true) %}
            {% for categoria, mensagem in mensagens %}
                <div class="alerta alerta-{{ categoria }} mb-2">{{ mensagem }}</div>
            {% endfor %}
        {% endwith %}

        <div class="login-card">

            <!-- Branding -->
            <div class="login-branding">
                <img src="{{ url_for('static', filename='img/logo.png') }}"
                     alt="Logo da Escola" class="login-logo"
                     onerror="this.style.display='none'">
                <div class="login-escola-nome">Sistema de Horários</div>
                <div class="login-sistema-tag">Portal Administrativo Escolar</div>
            </div>

            <!-- Formulário -->
            <form method="POST" action="{{ url_for('login') }}" autocomplete="on">

                <div class="login-input-grupo">
                    <label class="login-input-label" for="email">E-mail</label>
                    <div class="login-input-wrapper">
                        <span class="login-input-prefix">✉️</span>
                        <input class="login-input" type="email" id="email" name="email"
                               required autofocus placeholder="seu@email.com"
                               autocomplete="username">
                    </div>
                </div>

                <div class="login-input-grupo">
                    <label class="login-input-label" for="senha">Senha</label>
                    <div class="login-input-wrapper">
                        <span class="login-input-prefix">🔒</span>
                        <input class="login-input" type="password" id="senha" name="senha"
                               required placeholder="••••••••"
                               autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="login-btn-entrar">
                    Entrar <span>→</span>
                </button>
            </form>

            <div class="login-rodape">
                © {{ 2024 }} Sistema de Horários Escolares &nbsp;·&nbsp;
                Acesso restrito a usuários autorizados
            </div>
        </div>
    </div>

    <script>
    (function () {
        var c = document.getElementById('fundo-estrelas');
        if (!c) return;
        var W = window.innerWidth, H = window.innerHeight;
        var total = Math.max(60, Math.min(Math.round((W * H) / 5800), 220));
        for (var i = 0; i < total; i++) {
            var s = document.createElement('div');
            s.className = 'estrela';
            var sz = 0.8 + Math.random() * 1.6;
            s.style.width = sz + 'px'; s.style.height = sz + 'px';
            s.style.left = (Math.random() * 100) + '%';
            s.style.top  = (Math.random() * 100) + '%';
            var dur = 22 + Math.random() * 28;
            s.style.setProperty('--dur', dur + 's');
            s.style.setProperty('--dx', ((Math.random() - 0.5) * 18) + 'px');
            s.style.setProperty('--dy', ((Math.random() - 0.5) * 18) + 'px');
            var opA = (0.25 + Math.random() * 0.45).toFixed(2);
            s.style.setProperty('--op-a', opA);
            s.style.setProperty('--op-b', (parseFloat(opA) + 0.15 + Math.random() * 0.2).toFixed(2));
            s.style.animationDelay = '-' + (Math.random() * dur).toFixed(2) + 's';
            c.appendChild(s);
        }
    })();
    </script>
</body>
</html>
